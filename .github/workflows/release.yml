name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: meridian-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: meridian-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: meridian-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: meridian-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/meridian-mcp \
             ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\meridian-mcp.exe `
               ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meridian-linux-x86_64/meridian-linux-x86_64
            meridian-macos-x86_64/meridian-macos-x86_64
            meridian-macos-arm64/meridian-macos-arm64
            meridian-windows-x86_64.exe/meridian-windows-x86_64.exe
          generate_release_notes: true